<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cẩm Nang Y Tế - Mùa Hè Xanh 2026</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: #bae6fd;
            background-image: radial-gradient(#7dd3fc 1px, transparent 1px);
            background-size: 24px 24px;
        }
        /* Hiệu ứng chuyển động mượt mà thế giới */
        .fade-slide-in {
            animation: fadeSlideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(16px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        /* Hiệu ứng Shimmer Loading chuyên nghiệp */
        .shimmer {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: loadingShimmer 1.5s infinite;
        }
        @keyframes loadingShimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #93c5fd;
            border-radius: 10px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-0 md:p-6 overflow-x-hidden">

    <!-- CONTAINER CHÍNH -->
    <div class="w-full h-screen md:h-[92vh] md:max-w-7xl bg-white/95 backdrop-blur-md md:rounded-[2.5rem] md:shadow-2xl overflow-hidden flex flex-col md:flex-row border-0 md:border-8 border-white transition-all duration-500">
        
        <!-- ================= CỘT TRÁI: BÌA SỔ TAY VÀ THANH TÌM KIẾM CỐ ĐỊNH ================= -->
        <div class="w-full md:w-[40%] bg-gradient-to-b from-[#7dd3fc] via-[#38bdf8] to-[#bae6fd] p-6 flex flex-col justify-between relative shrink-0 overflow-y-auto min-h-[440px] md:min-h-0 border-b md:border-b-0 md:border-r border-white/40">
            <!-- Mặt trời vẽ tay SVG -->
            <div class="absolute top-4 right-4 w-14 h-14 animate-pulse">
                <svg viewBox="0 0 100 100" class="w-full h-full">
                    <circle cx="50" cy="50" r="25" fill="#fcd34d" />
                    <path d="M50 15 L50 5 M50 85 L50 95 M15 50 L5 50 M85 50 L95 50 M25 25 L18 18 M75 75 L82 82 M25 75 L18 82 M75 25 L82 18" stroke="#f59e0b" stroke-width="6" stroke-linecap="round" />
                    <circle cx="42" cy="45" r="3" fill="#1e293b" />
                    <circle cx="58" cy="45" r="3" fill="#1e293b" />
                    <path d="M44 56 Q50 62 56 56" stroke="#1e293b" stroke-width="3" fill="none" stroke-linecap="round" />
                </svg>
            </div>

            <!-- Tiêu đề bìa -->
            <div class="text-center md:text-left mt-2 z-10">
                <p class="text-[9px] font-black text-sky-900 uppercase tracking-widest bg-white/40 inline-block px-3 py-1 rounded-full border border-white/40">HCMUS • BAN HOẠT ĐỘNG</p>
                <h1 class="text-2xl md:text-3.5xl font-black text-white mt-3 leading-none tracking-tight drop-shadow-[0_2px_2px_rgba(3,105,161,0.4)]">
                    CẨM NANG <br class="hidden md:block">
                    <span class="text-3xl md:text-4xl text-yellow-300 font-extrabold tracking-wide drop-shadow-[0_3px_0_#d97706] block mt-1">Y TẾ ĐIỆN TỬ</span>
                </h1>
                
                <div class="inline-block bg-yellow-400 text-sky-950 font-black text-[10px] md:text-xs px-5 py-1.5 rounded-full shadow-md transform -rotate-1 mt-3 border border-white">
                    MÙA HÈ XANH 2026
                </div>

                <!-- ================= THANH TÌM KIẾM THÔNG MINH + GỢI Ý ================= -->
                <div class="mt-4 bg-white text-slate-800 p-3 rounded-2xl shadow-md flex flex-col gap-2 relative border border-sky-100 z-35">
                    <div class="flex items-center gap-2.5">
                        <span class="text-base shrink-0">🔍</span>
                        <input id="global-search-input" type="text" oninput="handleGlobalSearch(this.value)" onkeydown="handleSearchKeyDown(event)" placeholder="Tìm nhanh tên thuốc, công dụng..." class="w-full bg-transparent focus:outline-none text-slate-700 text-xs font-bold placeholder-slate-400">
                        <button id="clear-search-btn" onclick="clearGlobalSearch()" class="hidden text-[10px] text-red-500 font-black bg-red-50 hover:bg-red-100 px-2 py-1 rounded-lg shrink-0 transition">
                            Xóa
                        </button>
                    </div>
                    
                    <!-- Khung gợi ý tự động -->
                    <div id="search-suggestions" class="hidden max-h-48 overflow-y-auto border-t border-slate-100 pt-2 flex flex-col gap-1 transition-all duration-200">
                        <!-- Vẽ danh sách gợi ý -->
                    </div>
                </div>
            </div>

            <!-- Hình ảnh Chiến sĩ tình nguyện vẽ tay bằng SVG -->
            <div class="flex justify-center items-end my-3 z-10">
                <div class="relative w-48 h-32 flex items-end justify-center">
                    <svg viewBox="0 0 200 150" class="w-full h-full animate-[bounce_5s_infinite]">
                        <!-- Tình nguyện viên nam -->
                        <path d="M30 150 C30 110 50 100 70 100 L70 150 Z" fill="#2563eb" />
                        <circle cx="50" cy="80" r="18" fill="#fecdd3" />
                        <path d="M30 75 Q50 55 70 75 Z" fill="#1e293b" />
                        <path d="M25 72 Q50 65 75 72" stroke="#15803d" stroke-width="6" stroke-linecap="round" />
                        <!-- Tình nguyện viên nữ -->
                        <path d="M130 150 C130 110 150 100 170 100 L170 150 Z" fill="#2563eb" />
                        <circle cx="150" cy="80" r="18" fill="#fecdd3" />
                        <path d="M132 75 Q150 58 168 75 Z" fill="#1e293b" />
                        <path d="M130 85 Q150 90 170 85" stroke="#be123c" stroke-width="4" fill="none" />
                        <!-- Hòm thuốc sơ cứu -->
                        <rect x="75" y="95" width="50" height="40" rx="8" fill="white" stroke="#94a3b8" stroke-width="2" />
                        <rect x="75" y="95" width="50" height="12" rx="4" fill="#cbd5e1" />
                        <rect x="95" y="110" width="10" height="20" fill="#ef4444" />
                        <rect x="90" y="115" width="20" height="10" fill="#ef4444" />
                    </svg>
                </div>
            </div>

            <!-- Khẩu hiệu & Bản quyền -->
            <div class="text-center md:text-left z-10">
                <p class="text-[9px] text-sky-950/80 font-extrabold leading-relaxed bg-white/30 p-2 rounded-xl border border-white/20 mb-3 text-center">
                    🌿 TRANG BỊ CHO CHIẾN SĨ <br>
                    <span class="text-[8px] uppercase tracking-wider text-sky-900 block">Đoàn kết - Tình nguyện - An toàn - Hiệu quả</span>
                </p>
                <div class="flex items-center justify-between gap-2 border-t border-white/20 pt-2.5">
                    <span class="text-[10px] font-black text-sky-950/70" id="admin-status-badge">BAN HOẠT ĐỘNG - HCMUS</span>
                    <button id="admin-lock-btn" onclick="toggleAdminPanel()" class="p-1.5 rounded-lg bg-white/50 border border-white/40 text-xs shadow-sm hover:bg-white transition active:scale-95">
                        🔓
                    </button>

            </div>
        </div>

        <!-- ================= CỘT PHẢI: VÙNG TRA CỨU ĐỘNG ================= -->
        <div id="col-dynamic" class="flex-1 flex flex-col bg-slate-50/50 overflow-hidden">
            <!-- Header có nút quay lại chỉ hiển thị trên di động -->
            <div class="p-3 border-b border-slate-100 bg-white flex md:hidden justify-between items-center shrink-0">
                <button id="mobile-back-btn" onclick="handleMobileBack()" class="bg-slate-100 text-slate-700 py-1.5 px-3 rounded-xl text-xs font-bold transition">
                    ← Quay lại
                </button>
                <span class="text-[10px] font-black text-slate-400 tracking-wider">CẨM NANG Y TẾ</span>
                <div class="w-16"></div>
            </div>

            <!-- Wrapper cuộn động chứa nội dung chính -->
            <div id="dynamic-content-wrapper" class="flex-1 flex flex-col p-4 md:p-6 overflow-y-auto">
                <!-- Hiệu ứng xương quét sáng (Skeleton Loading) đẹp mắt lúc tải -->
                <div class="w-full h-full flex flex-col justify-between space-y-4 m-auto">
                    <div class="shimmer h-12 rounded-3xl w-full"></div>
                    <div class="grid grid-cols-2 gap-4 flex-1">
                        <div class="shimmer rounded-3xl h-full"></div>
                        <div class="shimmer rounded-3xl h-full"></div>
                        <div class="shimmer rounded-3xl h-full"></div>
                        <div class="shimmer rounded-3xl h-full"></div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- HỘP THOẠI NHẬP MẬT MÃ QUẢN TRỊ -->
    <div id="admin-login-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl max-w-xs w-full p-6 shadow-2xl border border-slate-100 space-y-4">
            <div class="text-center">
                <span class="text-3xl">🔐</span>
                <h3 class="text-sm font-black text-slate-800 mt-2 uppercase tracking-wider">XÁC THỰC QUẢN TRỊ VIÊN</h3>
                <p class="text-[10px] text-slate-400 font-bold mt-1">Mở khóa quyền chỉnh sửa cơ sở dữ liệu.</p>
            </div>
            <input id="admin-pass-input" type="password" placeholder="Mật mã..." class="w-full px-4 py-2.5 border border-slate-300 rounded-xl text-center font-bold text-slate-850 focus:ring-2 focus:ring-sky-400 focus:outline-none text-xs">
            <div class="flex gap-2">
                <button onclick="verifyAdminCode()" class="flex-1 bg-sky-500 hover:bg-sky-600 text-white font-black py-2 rounded-xl text-xs transition active:scale-95 shadow-sm">Xác nhận</button>
                <button onclick="closeLoginModal()" class="bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-2 px-4 rounded-xl text-xs transition">Hủy</button>
            </div>
        </div>
    </div>

    <!-- HỆ THỐNG XỬ LÝ DỮ LIỆU ĐỘNG -->
    <script>
        const ADMIN_PASSCODE = "HCMUS2026";
        const CLOUD_STORAGE_URL = "https://api.jsonbin.io/v3/b/6678da4bacd69e8558abe6ff"; // Backup URL dự phòng cho trường hợp lỗi

        const DEFAULT_DATABASE = [
            {
                id: "01",
                title: "Họ sốt, giảm đau",
                desc: "Hạ sốt, giảm đau nhẹ đến vừa (đau đầu, đau răng, đau mỏi cơ, sốt do cảm cúm...).",
                icon: "💊",
                color: "from-amber-400 to-orange-500",
                textBg: "bg-amber-50",
                textColor: "text-amber-800",
                badgeBorder: "border-amber-200",
                medicines: [
                    {
                        name: "Paracetamol (500mg)",
                        image: "https://images.unsplash.com/photo-1584308666744-24d5c474f2ae?w=300&auto=format&fit=crop&q=80",
                        congDung: "Hạ sốt, giảm đau từ nhẹ đến vừa (đau đầu, đau răng, đau cơ, sốt do cảm cúm...).",
                        truongHop: ["Đau đầu, đau nửa đầu", "Đau lưng, đau cơ và thấp khớp", "Đau răng", "Đau bụng chu kỳ kinh nguyệt", "Cảm lạnh, cảm cúm, đau họng", "Sốt cao"],
                        lieuLuong: "1 – 2 viên/lần, cách nhau 4 – 6 giờ nếu cần.",
                        khuyenCao: [
                            "<b>Chống chỉ định:</b> Không dùng cho người suy gan nặng.",
                            "<b>Tuyệt đối:</b> Không uống rượu, bia trong thời gian dùng thuốc (nguy cơ hủy hoại tế bào gan).",
                            "<b>Giới hạn giảm đau:</b> Không tự ý dùng quá 10 ngày liên tục.",
                            "<b>Giới hạn hạ sốt:</b> Không tự ý dùng khi sốt cao trên 39.5°C hoặc sốt kéo dài quá 3 ngày."
                        ]
                    }
                ]
            },
            {
                id: "02",
                title: "Tiêu hóa",
                desc: "Đặc trị tiêu chảy, rối loạn đường ruột, đau dạ dày và các chứng đầy hơi chướng bụng.",
                icon: "🧪",
                color: "from-emerald-400 to-teal-500",
                textBg: "bg-emerald-50",
                textColor: "text-emerald-800",
                badgeBorder: "border-emerald-200",
                medicines: [
                    {
                        name: "Berberin (10mg & 50mg)",
                        image: "https://images.unsplash.com/photo-1550572017-edd951b55104?w=300&auto=format&fit=crop&q=80",
                        congDung: "Đặc trị tiêu chảy do vi khuẩn, ký sinh trùng đường ruột, vi khuẩn E.Coli và vi khuẩn tả. Tiêu diệt vi khuẩn có hại nhưng không làm ảnh hưởng đến lợi khuẩn đường ruột.",
                        truongHop: ["Tiêu chảy cấp", "Đau bụng đi ngoài", "Viêm đường ruột, trực khuẩn", "Viêm ống mật"],
                        lieuLuong: "<b>Berberin 10mg:</b> 4 – 6 viên/lần, ngày uống 2 lần.<br><b>Berberin 50mg:</b> 1 – 2 viên/lần, ngày uống 2 lần.",
                        khuyenCao: [
                            "<b>Cách dùng tốt nhất:</b> Nên uống sau khi ăn no (sáng và tối). Trường hợp khẩn cấp uống ngay khi đau bụng.",
                            "<b>Giới hạn tự điều trị:</b> Chỉ dùng ngắn ngày. Sau 2 ngày không đỡ phải đi khám bác sĩ ngay.",
                            "<b>Tương tác thuốc:</b> Uống cách xa các loại thuốc khác từ 1 - 2 giờ. Không dùng chung với cyclosporine, lovastatin...",
                            "<b>Kiêng khem:</b> Không uống rượu bia, hút thuốc lá trong quá trình dùng thuốc."
                        ]
                    }
                ]
            }
        ];

        let database = JSON.parse(localStorage.getItem('hcmus_medical_handbook_db')) || DEFAULT_DATABASE;

        let activeCategoryId = "01";
        let activeMedicineIndex = 0;
        let isEditMode = false;
        let isAddMode = false;
        let isCategoryEditMode = false; // Trạng thái sửa đổi tên/mô tả nhóm danh mục
        let searchQuery = "";
        let rightPanelState = "home";
        let isUploadingImage = false; // Loading tải ảnh

        let isAdmin = localStorage.getItem('hcmus_admin_active') === 'true';

        // CHUYỂN PANEL TRẠNG THÁI BÊN PHẢI (KÈM KHÓA CUỘN THÔNG MINH CHO TRANG CHỦ)
        function setRightPanelState(state) {
            rightPanelState = state;
            
            const backBtn = document.getElementById("mobile-back-btn");
            if (window.innerWidth < 768) {
                if (state !== "home") {
                    if (backBtn) backBtn.classList.remove("hidden");
                } else {
                    if (backBtn) backBtn.classList.add("hidden");
                }
            } else {
                if (backBtn) backBtn.classList.add("hidden");
            }

            renderDynamicRightPanel();
        }

        // TẢI DỮ LIỆU ĐÁM MÂY KHI MỞ TRANG
        async function fetchDatabaseFromCloud() {
            try {
                const response = await fetch(`${CLOUD_STORAGE_URL}?t=${Date.now()}`);
                if (response.ok) {
                    const cloudData = await response.json();
                    if (cloudData && Array.isArray(cloudData)) {
                        database = cloudData;
                        localStorage.setItem('hcmus_medical_handbook_db', JSON.stringify(database));
                    }
                }
            } catch (error) {
                console.warn("Lỗi đám mây, sử dụng local database", error);
            } finally {
                setupResponsiveLayout();
            }
        }

        // ĐỒNG BỘ ĐÁM MÂY TỰ ĐỘNG
        async function syncDatabaseToCloud() {
            localStorage.setItem('hcmus_medical_handbook_db', JSON.stringify(database));
            try {
                await fetch(CLOUD_STORAGE_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(database)
                });
            } catch (err) {
                console.error("Lỗi đồng bộ đám mây:", err);
            }
        }

        // HÀM NÉN ẢNH VÀO CANVAS VÀ TẢI LÊN CDN HOẶC CHUYỂN BASE64 CỰC KỲ KHỎE
        async function compressAndUploadImage(file) {
            isUploadingImage = true;
            const progressIndicator = document.getElementById("image-upload-progress");
            if (progressIndicator) progressIndicator.classList.remove("hidden");

            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = function (event) {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = async function () {
                        // Nén ảnh chiều rộng/cao tối đa 450px để tối ưu dung lượng đám mây
                        const canvas = document.createElement("canvas");
                        const max_size = 450;
                        let width = img.width;
                        let height = img.height;
                        if (width > height) {
                            if (width > max_size) {
                                height *= max_size / width;
                                width = max_size;
                            }
                        } else {
                            if (height > max_size) {
                                width *= max_size / height;
                                height = max_size;
                            }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext("2d");
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // Chuyển blob gửi lên máy chủ telegra.ph miễn phí
                        canvas.toBlob(async (blob) => {
                            try {
                                const formData = new FormData();
                                formData.append("file", blob, "compressed_med_image.jpg");
                                const response = await fetch("https://telegra.ph/upload", {
                                    method: "POST",
                                    body: formData
                                });
                                const result = await response.json();
                                isUploadingImage = false;
                                if (progressIndicator) progressIndicator.classList.add("hidden");

                                if (result && result[0] && result[0].src) {
                                    resolve("https://telegra.ph" + result[0].src);
                                } else {
                                    // Fallback: Nếu lỗi kết nối CDN thì dùng Base64 nén lưu trữ trực tiếp
                                    resolve(canvas.toDataURL("image/jpeg", 0.75));
                                }
                            } catch (e) {
                                isUploadingImage = false;
                                if (progressIndicator) progressIndicator.classList.add("hidden");
                                // Fallback dùng Base64
                                resolve(canvas.toDataURL("image/jpeg", 0.75));
                            }
                        }, "image/jpeg", 0.75);
                    };
                };
                reader.onerror = (error) => {
                    isUploadingImage = false;
                    if (progressIndicator) progressIndicator.classList.add("hidden");
                    reject(error);
                };
            });
        }

        // LÀM ĐỒNG BỘ FILE TẢI ẢNH LÊN
        async function handleImageFileChange(inputElement) {
            const file = inputElement.files[0];
            if (!file) return;
            try {
                const cloudUrl = await compressAndUploadImage(file);
                document.getElementById("edit-image-url-hidden").value = cloudUrl;
                
                // Hiển thị Preview ảnh vừa tải lên form
                const previewImg = document.getElementById("edit-image-preview");
                if (previewImg) {
                    previewImg.src = cloudUrl;
                    previewImg.classList.remove("hidden");
                }
            } catch (err) {
                alert("Lỗi tải ảnh lên đám mây, vui lòng thử lại!");
            }
        }

        // VẼ DỮ LIỆU ĐỘNG CỘT PHẢI THEO TRẠNG THÁI MỚI (TÍCH HỢP HIỆU ỨNG GLOW CAO CẤP)
        function renderDynamicRightPanel() {
            const wrapper = document.getElementById("dynamic-content-wrapper");
            if (!wrapper) return;
            wrapper.innerHTML = "";

            if (rightPanelState === "home") {
                wrapper.className = "flex-1 flex flex-col p-3 md:p-4 justify-between md:overflow-y-hidden overflow-y-auto";
            } else {
                wrapper.className = "flex-1 flex flex-col p-4 md:p-6 overflow-y-auto";
            }

            if (rightPanelState === "home") {
                // ================= TRẠNG THÁI 1: HIỂN THỊ 8 DANH MỤC TRANG CHỦ =================
                let filteredHtml = "";
                
                if (searchQuery.trim() !== "") {
                    let matches = [];
                    database.forEach(cat => {
                        cat.medicines.forEach((med, mIdx) => {
                            if (med.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                med.congDung.toLowerCase().includes(searchQuery.toLowerCase())) {
                                matches.push({ cat, med, mIdx });
                            }
                        });
                    });

                    let matchCards = "";
                    if (matches.length > 0) {
                        matches.forEach(item => {
                            const imgHtml = item.med.image 
                                ? `<img src="${item.med.image}" alt="${item.med.name}" class="w-12 h-12 rounded-xl object-cover shadow-sm shrink-0">`
                                : `<div class="w-12 h-12 rounded-xl bg-slate-100 flex items-center justify-center text-xl shrink-0">💊</div>`;

                            matchCards += `
                                <div onclick="selectMedicineFromSearch('${item.cat.id}', ${item.mIdx})" class="p-3 bg-white hover:bg-sky-50 active:scale-98 transition rounded-2xl border border-slate-100 shadow-sm flex items-center gap-3 cursor-pointer">
                                    ${imgHtml}
                                    <div class="flex-1 min-w-0">
                                        <div class="flex justify-between items-center">
                                            <h4 class="text-sm font-black text-slate-800 truncate">${item.med.name}</h4>
                                            <span class="text-[9px] bg-sky-100 text-sky-800 font-bold px-2 py-0.5 rounded-full">${item.cat.title}</span>
                                        </div>
                                        <p class="text-[11px] text-slate-400 font-bold line-clamp-1 mt-0.5">${item.med.congDung.replace(/<[^>]*>/g, '')}</p>
                                    </div>
                                </div>
                            `;
                        });
                    } else {
                        matchCards = `

            if (!cat) return;

            const newTitle = document.getElementById("edit-cat-title").value.trim();
            const newDesc = document.getElementById("edit-cat-desc").value.trim();

            if (!newTitle || !newDesc) {
                alert("Vui lòng nhập đầy đủ Tên nhóm và Mô tả nhóm!");
                return;
            }

            cat.title = newTitle;
            cat.desc = newDesc;

            syncDatabaseToCloud();
            isCategoryEditMode = false;

            setupResponsiveLayout();
            alert("Đã lưu chỉnh sửa danh mục thành công!");
        }

        function handleGlobalSearch(val) {
            searchQuery = val.trim();
            const suggestionsDiv = document.getElementById("search-suggestions");
            const clearBtn = document.getElementById("clear-search-btn");

            if (searchQuery === "") {
                if (suggestionsDiv) {
                    suggestionsDiv.innerHTML = "";
                    suggestionsDiv.classList.add("hidden");
                }
                if (clearBtn) clearBtn.classList.add("hidden");
                setRightPanelState("home");
                return;
            }

            if (clearBtn) clearBtn.classList.remove("hidden");

            // Lọc thuốc
            let matches = [];
            database.forEach(cat => {
                cat.medicines.forEach((med, mIdx) => {
                    if (med.name.toLowerCase().includes(searchQuery.toLowerCase())) {
                        matches.push({ cat, med, mIdx });
                    }
                });
            });

            // Hiển thị gợi ý
            if (suggestionsDiv) {
                if (matches.length > 0) {
                    let suggestionHtml = "";
                    matches.slice(0, 5).forEach(item => {
                        suggestionHtml += `
                            <div onclick="clickSearchSuggestion('${item.cat.id}', ${item.mIdx})" class="p-2 hover:bg-sky-50 rounded-xl text-left text-[11px] font-bold text-slate-700 cursor-pointer flex justify-between items-center transition border border-transparent hover:border-sky-100 w-full">
                                <span class="truncate">${item.med.name}</span>
                                <span class="text-[9px] bg-sky-100 text-sky-800 px-1.5 py-0.5 rounded-full shrink-0 scale-90 font-black">${item.cat.icon}</span>
                            </div>
                        `;
                    });
                    suggestionsDiv.innerHTML = suggestionHtml;
                    suggestionsDiv.classList.remove("hidden");
                } else {
                    suggestionsDiv.innerHTML = `<div class="text-[10px] text-slate-400 p-2 italic text-left">Không tìm thấy gợi ý...</div>`;
                    suggestionsDiv.classList.remove("hidden");
                }
            }

            setRightPanelState("home");
        }

        // XỬ LÝ CLICK GỢI Ý TÌM KIẾM
        function clickSearchSuggestion(catId, medIndex) {
            const suggestionsDiv = document.getElementById("search-suggestions");
            if (suggestionsDiv) suggestionsDiv.classList.add("hidden");
            selectMedicineFromSearch(catId, medIndex);
        }

        // ENTER ĐỂ CHỌN THUỐC NHANH ĐẦU TIÊN KHỚP
        function handleSearchKeyDown(event) {
            if (event.key === 'Enter') {
                const query = document.getElementById("global-search-input").value.trim();
                if (!query) return;

                let firstMatch = null;
                for (let cat of database) {
                    for (let i = 0; i < cat.medicines.length; i++) {
                        if (cat.medicines[i].name.toLowerCase().includes(query.toLowerCase())) {
                            firstMatch = { catId: cat.id, medIndex: i };
                            break;
                        }
                    }
                    if (firstMatch) break;
                }

                if (firstMatch) {
                    const suggestionsDiv = document.getElementById("search-suggestions");
                    if (suggestionsDiv) suggestionsDiv.classList.add("hidden");
                    document.getElementById("global-search-input").blur();
                    selectMedicineFromSearch(firstMatch.catId, firstMatch.medIndex);
                }
            }
        }

        // XÓA TÌM KIẾM
        function clearGlobalSearch() {
            searchQuery = "";
            const searchInput = document.getElementById("global-search-input");
            if (searchInput) searchInput.value = "";
            
            const clearBtn = document.getElementById("clear-search-btn");
            if (clearBtn) clearBtn.classList.add("hidden");

            const suggestionsDiv = document.getElementById("search-suggestions");
            if (suggestionsDiv) {
                suggestionsDiv.innerHTML = "";
                suggestionsDiv.classList.add("hidden");
            }

            setRightPanelState("home");
        }

        // LỰA CHỌN DANH MỤC TRÊN MỤC LỤC
        function selectCategory(catId) {
            activeCategoryId = catId;
            activeMedicineIndex = 0;
            isEditMode = false;
            isAddMode = false;
            isCategoryEditMode = false;
            setRightPanelState("category");
        }

        // LỰA CHỌN THUỐC
        function selectMedicine(index) {
            activeMedicineIndex = index;
            isEditMode = false;
            isAddMode = false;
            setRightPanelState("detail");
        }

        // LỰA CHỌN THUỐC TRỰC TIẾP TỪ DÒNG TÌM KIẾM
        function selectMedicineFromSearch(catId, medIndex) {
            activeCategoryId = catId;
            activeMedicineIndex = medIndex;
            isEditMode = false;
            isAddMode = false;
            setRightPanelState("detail");
        }

        // ĐÓNG MỞ QUẢN TRỊ VIÊN BẰNG PASSCODE TĨNH
        function toggleAdminPanel() {
            if (isAdmin) {
                isAdmin = false;
                localStorage.setItem('hcmus_admin_active', 'false');
                isEditMode = false;
                isAddMode = false;
                isCategoryEditMode = false;
                alert("Đã thoát chế độ Quản trị viên. Đưa về chế độ Xem thường của chiến sĩ.");
                
                document.getElementById("admin-status-badge").textContent = "BAN HOẠT ĐỘNG - HCMUS";
                renderMenu();
                renderDynamicRightPanel();
            } else {
                document.getElementById("admin-login-modal").classList.remove("hidden");
                document.getElementById("admin-pass-input").value = "";
                document.getElementById("admin-pass-input").focus();
            }
        }

        // XÁC THỰC MẬT MÃ ADMIN
        function verifyAdminCode() {
            const passInput = document.getElementById("admin-pass-input").value.trim();
            if (passInput === ADMIN_PASSCODE) {
                isAdmin = true;
                localStorage.setItem('hcmus_admin_active', 'true');
                closeLoginModal();
                alert("Mở khóa thành công! Bạn hiện có quyền Thêm, Sửa và Xóa các loại thuốc.");
                
                document.getElementById("admin-status-badge").textContent = "⚙️ CHẾ ĐỘ QUẢN TRỊ";
                renderMenu();
                renderDynamicRightPanel();
            } else {
                alert("Mật mã không đúng! Vui lòng liên hệ Ban Hoạt Động để nhận mã xác thực.");
            }
        }

        function closeLoginModal() {
            document.getElementById("admin-login-modal").classList.add("hidden");
        }

        // TẠO GIAO DIỆN THANH CÔNG CỤ ĐỊNH DẠNG (FORMATTING TOOLBAR)
        function getToolbarHtml(textareaId) {
            return `
                <div class="flex flex-wrap gap-1.5 mb-1 bg-slate-100 p-1.5 rounded-t-xl border-t border-x border-slate-200">
                    <button type="button" onclick="insertFormat('${textareaId}', 'b')" class="px-2.5 py-1 bg-white hover:bg-slate-50 rounded border border-slate-300 text-[10px] font-black shadow-sm active:scale-95 transition">In đậm (B)</button>
                    <button type="button" onclick="insertFormat('${textareaId}', 'i')" class="px-2.5 py-1 bg-white hover:bg-slate-50 rounded border border-slate-300 text-[10px] italic shadow-sm active:scale-95 transition">In nghiêng (I)</button>
                    <button type="button" onclick="insertFormat('${textareaId}', 'br')" class="px-2.5 py-1 bg-white hover:bg-slate-50 rounded border border-slate-300 text-[10px] shadow-sm active:scale-95 transition">↵ Xuống dòng</button>
                </div>
            `;
        }

        // XỬ LÝ QUAY LẠI TRÊN DI ĐỘNG (MOBILE BACK)
        function handleMobileBack() {
            if (rightPanelState === "detail") {
                setRightPanelState("category");
            } else if (rightPanelState === "category") {
                setRightPanelState("home");
            }
        }

        // THIẾT LẬP MENU & KHÓA ADMIN
        function renderMenu() {
            const lockBtn = document.getElementById("admin-lock-btn");
            if (!lockBtn) return;
            if (isAdmin) {
                lockBtn.textContent = "🔒";
                lockBtn.title = "Đang mở quyền quản trị (Bấm để khóa lại)";
                lockBtn.className = "p-1.5 rounded-lg bg-emerald-100 border border-emerald-300 text-xs shadow-sm hover:bg-red-100 transition active:scale-95";
            } else {
                lockBtn.textContent = "🔓";
                lockBtn.title = "Đang khóa quyền sửa (Bấm để mở)";
                lockBtn.className = "p-1.5 rounded-lg bg-white/50 border border-white/40 text-xs shadow-sm hover:bg-white transition active:scale-95";
            }
        }

        // TỰ ĐỘNG ĐIỀU CHỈNH GIAO DIỆN THEO ĐỘ PHÂN GIẢI
        function setupResponsiveLayout() {
            const backBtn = document.getElementById("mobile-back-btn");
            if (window.innerWidth >= 768) {
                if (backBtn) backBtn.classList.add("hidden");
                document.getElementById("admin-status-badge").textContent = isAdmin 
                    ? "⚙️ CHẾ ĐỘ QUẢN TRỊ" 
                    : "BAN HOẠT ĐỘNG - HCMUS";
            } else {
                if (backBtn) {
                    if (rightPanelState !== "home") {
                        backBtn.classList.remove("hidden");
                    } else {
                        backBtn.classList.add("hidden");
                    }
                }
            }
            renderMenu();
            renderDynamicRightPanel();
        }

        // KHỞI CHẠY KHI TẢI TRANG HOÀN TẤT
        window.addEventListener('resize', setupResponsiveLayout);
        window.onload = function() {
            fetchDatabaseFromCloud();
        };
    </script>
</body>
</html>
