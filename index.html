                                <p class="text-[11px] opacity-90 px-6 mt-1.5 leading-relaxed">${cat.desc}</p>
                            </div>
                        </div>

                        <!-- Danh sách thuốc cuộn -->
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3.5">
                            ${medicinesCards}
                        </div>

                        ${addBtnHtml}
                    </div>
                `;
            } else if (rightPanelState === "detail") {
                // ================= TRẠNG THÁI 3: CHI TIẾT THUỐC HOẶC EDIT FORM =================
                const cat = database.find(c => c.id === activeCategoryId);
                if (!cat) return;

                if (isEditMode || isAddMode) {
                    // ======= CHẾ ĐỘ FORM CHỈNH SỬA / THÊM MỚI THUỐC =======
                    let name = "";
                    let image = "";
                    let congDung = "";
                    let lieuLuong = "";
                    let truongHopStr = "";
                    let khuyenCaoStr = "";

                    if (isEditMode) {
                        const med = cat.medicines[activeMedicineIndex];
                        if (!med) return;
                        name = med.name;
                        image = med.image || "";
                        congDung = med.congDung;
                        lieuLuong = med.lieuLuong;
                        truongHopStr = med.truongHop.join(', ');
                        khuyenCaoStr = med.khuyenCao.join('\n');
                    }

                    const titleForm = isAddMode 
                        ? `<span>➕</span> THÊM THUỐC MỚI VÀO NHÓM ${cat.title.toUpperCase()}` 
                        : `<span>✏️</span> CHỈNH SỬA THÔNG TIN: ${name.toUpperCase()}`;

                    wrapper.innerHTML = `
                        <div class="space-y-4 fade-slide-in pb-6">
                            <div class="bg-amber-50 border border-amber-200 p-4 rounded-2xl">
                                <h2 class="text-sm font-black text-amber-800 uppercase tracking-wide flex items-center gap-2">
                                    ${titleForm}
                                </h2>
                                <p class="text-[10px] text-amber-700 font-bold mt-1 leading-snug">
                                    Bôi đen văn bản và nhấn các nút định dạng B hoặc I để in đậm, in nghiêng dễ dàng.
                                </p>
                            </div>

                            <!-- Tên thuốc -->
                            <div class="space-y-1">
                                <label class="text-xs font-black text-slate-500 uppercase tracking-wider block">Tên thuốc (Bắt buộc)</label>
                                <input id="edit-name" type="text" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-sky-400 focus:outline-none font-bold text-slate-800 text-sm" value="${name}" placeholder="Ví dụ: Decolgen ND">
                            </div>

                            <!-- Đường dẫn hình ảnh thuốc (URL) -->
                            <div class="space-y-1">
                                <label class="text-xs font-black text-slate-500 uppercase tracking-wider block">Đường dẫn hình ảnh thuốc (URL)</label>
                                <input id="edit-image" type="text" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-sky-400 focus:outline-none font-semibold text-slate-700 text-xs" value="${image}" placeholder="Dán link ảnh từ web (Ví dụ: https://...)">
                            </div>

                            <!-- Trường hợp sử dụng -->
                            <div class="space-y-1">
                                <label class="text-xs font-black text-slate-500 uppercase tracking-wider block">Trường hợp chỉ định (Mỗi chỉ định phân cách bằng dấu phẩy ",")</label>
                                <input id="edit-truonghop" type="text" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-sky-400 focus:outline-none font-bold text-slate-800 text-xs" value="${truongHopStr}" placeholder="Ví dụ: Đau họng, Sổ mũi, Cảm cúm">
                            </div>

                            <!-- Công dụng -->
                            <div class="space-y-1">
                                <label class="text-xs font-black text-slate-500 uppercase tracking-wider block">Công dụng chính (Bắt buộc)</label>
                                ${getToolbarHtml('edit-congdung')}
                                <textarea id="edit-congdung" rows="3" class="w-full px-4 py-2 bg-white rounded-b-xl border-b border-x border-slate-300 focus:ring-2 focus:ring-sky-400 focus:outline-none font-semibold text-slate-700 text-xs shadow-inner" placeholder="Thuốc đặc trị các cơn ho khan, long đờm...">${congDung}</textarea>
                            </div>

                            <!-- Liều dùng -->
                            <div class="space-y-1">
                                <label class="text-xs font-black text-slate-500 uppercase tracking-wider block">Liều lượng & Cách dùng (Bắt buộc)</label>
                                ${getToolbarHtml('edit-lieuluong')}
                                <textarea id="edit-lieuluong" rows="3" class="w-full px-4 py-2 bg-white rounded-b-xl border-b border-x border-slate-300 focus:ring-2 focus:ring-sky-400 focus:outline-none font-semibold text-slate-700 text-xs shadow-inner" placeholder="Uống ngày 2 lần, mỗi lần 1 viên sau ăn no...">${lieuLuong}</textarea>
                            </div>

                            <!-- Khuyến cáo -->
                            <div class="space-y-1">
                                <label class="text-xs font-black text-slate-500 uppercase tracking-wider block">Khuyến cáo an toàn (Nhấn Enter xuống dòng để phân biệt các dòng)</label>
                                <textarea id="edit-khuyencao" rows="3" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-sky-400 focus:outline-none font-semibold text-slate-700 text-xs shadow-inner" placeholder="Không dùng cho người có tiền sử loét dạ dày&#10;Tránh dùng kéo dài quá 5 ngày">${khuyenCaoStr}</textarea>
                            </div>

                            <!-- Nút hành động -->
                            <div class="flex gap-3 pt-2">
                                <button onclick="saveMedicineData()" class="flex-1 bg-emerald-500 hover:bg-emerald-600 active:scale-95 transition text-white font-black py-3 rounded-xl text-xs flex items-center justify-center gap-1.5 shadow-md">
                                    <span>💾</span> Lưu thông tin
                        </button>
                                <button onclick="disableEditMode()" class="bg-slate-200 hover:bg-slate-300 active:scale-95 transition text-slate-700 font-black py-3 px-6 rounded-xl text-xs">
                                    Hủy bỏ
                                </button>
                            </div>
                        </div>
                    `;
                } else {
                    // ======= CHẾ ĐỘ XEM CHI TIẾT THUỐC =======
                    const med = cat.medicines[activeMedicineIndex];
                    if (!med) return;

                    const detailImageHtml = med.image
                        ? `
                        <div class="flex justify-center my-2 bg-white p-3 rounded-2xl border border-slate-100 shadow-sm">
                            <img src="${med.image}" alt="${med.name}" class="w-full max-w-[200px] h-32 object-cover rounded-xl shadow-md border border-slate-200/40">
                        </div>
                        `
                        : "";

                    let truongHopHtml = "";
                    med.truongHop.forEach(th => {
                        truongHopHtml += `<span class="bg-slate-100 text-slate-700 font-bold text-[10px] px-2.5 py-1 rounded-full border border-slate-200">${th}</span>`;
                    });

                    let khuyenCaoHtml = "";
                    med.khuyenCao.forEach(kc => {
                        khuyenCaoHtml += `<li class="text-xs text-amber-900 leading-relaxed font-semibold mb-1.5">• ${kc}</li>`;
                    });

                    const adminActionsHtml = isAdmin 
                        ? `
                        <div class="flex gap-2">
                            <button onclick="enableEditMode()" class="bg-sky-100 hover:bg-sky-200 active:scale-95 transition text-sky-700 font-extrabold text-[10px] py-1.5 px-3 rounded-xl flex items-center gap-1 border border-sky-200 shadow-sm">
                                ✏️ Sửa
                            </button>
                            <button onclick="deleteMedicine()" class="bg-red-50 hover:bg-red-100 active:scale-95 transition text-red-600 font-extrabold text-[10px] py-1.5 px-3 rounded-xl flex items-center gap-1 border border-red-200 shadow-sm">
                                🗑️ Xóa
                            </button>
                        </div>
                        `
                        : "";

                    wrapper.innerHTML = `
                        <div class="space-y-4 fade-slide-in">
                            <!-- Header Chi Tiết Thuốc -->
                            <div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm flex flex-wrap justify-between items-center gap-3">
                                <div class="flex items-center gap-3">
                                    <button onclick="goBackToCategory()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 p-2 rounded-xl text-xs font-bold transition">
                                        ← Trở về
                                    </button>
                                    <div class="text-left">
                                        <span class="text-[9px] font-black tracking-widest text-slate-400 block uppercase">Danh mục thuốc</span>
                                        <h2 class="text-base md:text-lg font-black text-slate-800 leading-tight mt-0.5">${med.name}</h2>
                                    </div>
                                </div>
                                ${adminActionsHtml}
                            </div>

                            <!-- Khối hiển thị hình ảnh lớn -->
                            ${detailImageHtml}

                            <!-- Các trường hợp sử dụng cụ thể -->
                            <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm space-y-2">
                                <span class="text-xs font-black text-slate-400 uppercase tracking-wide block">🎯 Trường hợp sử dụng điển hình</span>
                                <div class="flex flex-wrap gap-1.5">
                                    ${truongHopHtml || '<span class="text-xs text-slate-400">Chưa nhập trường hợp sử dụng cụ thể</span>'}
                                </div>
                            </div>

                            <!-- Các block Công dụng & Liều dùng chính -->
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div class="bg-emerald-50 border border-emerald-100 p-4 rounded-2xl space-y-1">
                                    <span class="text-[9px] font-black text-emerald-800 tracking-wider block">💚 CÔNG DỤNG CHÍNH</span>
                                    <p class="text-xs text-emerald-950 font-bold leading-relaxed">${med.congDung}</p>
                                </div>
                                <div class="bg-sky-50 border border-sky-100 p-4 rounded-2xl space-y-1">
                                    <span class="text-[9px] font-black text-sky-800 tracking-wider block">🕒 LIỀU LƯỢNG SỬ DỤNG</span>
                                    <p class="text-xs text-sky-950 font-bold leading-relaxed">${med.lieuLuong}</p>
                                </div>
                            </div>

                            <!-- Khuyến cáo quan trọng cho Chiến sĩ -->
                            <div class="bg-amber-50/70 border border-amber-200/80 p-4 rounded-2xl space-y-2">
                                <span class="text-[9px] font-black text-amber-800 tracking-wider block">⚠️ KHUYẾN CÁO AN TOÀN & KIÊNG KHEM</span>
                                <ul class="list-none pl-0">
                                    ${khuyenCaoHtml || '<li class="text-xs text-slate-400">Chưa có khuyến cáo cụ thể</li>'}
                                </ul>
                            </div>

                            <!-- Ghi nhớ tiện ích của đội -->
                            <div class="bg-blue-50 border border-blue-100 p-4 rounded-2xl text-xs text-blue-900 font-semibold leading-relaxed flex gap-2">
                                <span class="text-base">💡</span>
                                <span><strong>Mẹo chiến sĩ:</strong> Luôn kiểm tra lại số lô, hạn sử dụng trên vỉ thuốc trước khi phát cho đồng bào hoặc đồng đội. Ghi chép nhật ký phát thuốc rõ ràng để quản lý cơ số thuốc tồn của đội.</span>
                            </div>
                        </div>
                    `;
                }
            }
        }

        // ĐIỀU HƯỚNG QUAY LẠI TRANG CHỦ
        function goBackToHome() {
            isEditMode = false;
            isAddMode = false;
            setRightPanelState("home");
        }

        // ĐIỀU HƯỚNG QUAY LẠI DANH MỤC THUỐC
        function goBackToCategory() {
            isEditMode = false;
            isAddMode = false;
            setRightPanelState("category");
        }

        // LỌC TÌM KIẾM THỜI GIAN THỰC
        function handleSearch(val) {
            searchQuery = val;
            setRightPanelState("home");
        }

        function clearSearch() {
            searchQuery = "";
            const searchInput = document.getElementById("search-input");
            if (searchInput) searchInput.value = "";
            setRightPanelState("home");
        }

        // LỰA CHỌN DANH MỤC TRÊN MỤC LỤC
        function selectCategory(catId) {
            activeCategoryId = catId;
            activeMedicineIndex = 0;
            isEditMode = false;
            isAddMode = false;
            setRightPanelState("category");
        }

        // LỰA CHỌN THUỐC
        function selectMedicine(index) {
            activeMedicineIndex = index;
            isEditMode = false;
            isAddMode = false;
            setRightPanelState("detail");
        }

        // LỰA CHỌN THUỐC TRỰC TIẾP TỪ DÒNG TÌM KIẾM
        function selectMedicineFromSearch(catId, medIndex) {
            activeCategoryId = catId;
            activeMedicineIndex = medIndex;
            isEditMode = false;
            isAddMode = false;
            setRightPanelState("detail");
        }

        // ĐÓNG MỞ QUẢN TRỊ VIÊN BẰNG PASSCODE TĨNH
        function toggleAdminPanel() {
            if (isAdmin) {
                isAdmin = false;
                localStorage.setItem('hcmus_admin_active', 'false');
                isEditMode = false;
                isAddMode = false;
                alert("Đã thoát chế độ Quản trị viên. Đưa về chế độ Xem thường của chiến sĩ.");
                
                document.getElementById("admin-status-badge").textContent = "BAN HOẠT ĐỘNG - HCMUS";
                renderMenu();
                renderDynamicRightPanel();
            } else {
                document.getElementById("admin-login-modal").classList.remove("hidden");
                document.getElementById("admin-pass-input").value = "";
                document.getElementById("admin-pass-input").focus();
            }
        }

        // XÁC THỰC MẬT MÃ ADMIN
        function verifyAdminCode() {
            const passInput = document.getElementById("admin-pass-input").value.trim();
            if (passInput === ADMIN_PASSCODE) {
                isAdmin = true;
                localStorage.setItem('hcmus_admin_active', 'true');
                closeLoginModal();
                alert("Mở khóa thành công! Bạn hiện có quyền Thêm, Sửa và Xóa các loại thuốc.");
                
                document.getElementById("admin-status-badge").textContent = "⚙️ CHẾ ĐỘ QUẢN TRỊ VIÊN";
                renderMenu();
                renderDynamicRightPanel();
            } else {
                alert("Mật mã không đúng! Vui lòng liên hệ Ban Hoạt Động để nhận mã xác thực.");
            }
        }

        function closeLoginModal() {
            document.getElementById("admin-login-modal").classList.add("hidden");
        }

        // TẠO GIAO DIỆN THANH CÔNG CỤ ĐỊNH DẠNG (FORMATTING TOOLBAR)
        function getToolbarHtml(textareaId) {
            return `
                <div class="flex flex-wrap gap-1.5 mb-1 bg-slate-100 p-1.5 rounded-t-xl border-t border-x border-slate-200">
                    <button type="button" onclick="insertFormat('${textareaId}', 'b')" class="px-2.5 py-1 bg-white hover:bg-slate-50 rounded border border-slate-300 text-[10px] font-black shadow-sm active:scale-95 transition">In đậm (B)</button>
                    <button type="button" onclick="insertFormat('${textareaId}', 'i')" class="px-2.5 py-1 bg-white hover:bg-slate-50 rounded border border-slate-300 text-[10px] italic shadow-sm active:scale-95 transition">In nghiêng (I)</button>
                    <button type="button" onclick="insertFormat('${textareaId}', 'br')" class="px-2.5 py-1 bg-white hover:bg-slate-50 rounded border border-slate-300 text-[10px] shadow-sm active:scale-95 transition">↵ Xuống dòng</button>
                </div>
            `;
        }

        // XỬ LÝ QUAY LẠI TRÊN DI ĐỘNG (MOBILE BACK)
        function handleMobileBack() {
            if (rightPanelState === "detail") {
                setRightPanelState("category");
            } else if (rightPanelState === "category") {
                setRightPanelState("home");
            }
        }

        // THIẾT LẬP MENU & KHÓA ADMIN
        function renderMenu() {
            const lockBtn = document.getElementById("admin-lock-btn");
            if (!lockBtn) return;
            if (isAdmin) {
                lockBtn.textContent = "🔒";
                lockBtn.title = "Đang mở quyền quản trị (Bấm để khóa lại)";
                lockBtn.className = "p-1.5 rounded-lg bg-emerald-100 border border-emerald-300 text-xs shadow-sm hover:bg-red-100 transition active:scale-95";
            } else {
                lockBtn.textContent = "🔓";
                lockBtn.title = "Đang khóa quyền sửa (Bấm để mở)";
                lockBtn.className = "p-1.5 rounded-lg bg-white/50 border border-white/40 text-xs shadow-sm hover:bg-white transition active:scale-95";
            }
        }

        // TỰ ĐỘNG ĐIỀU CHỈNH GIAO DIỆN THEO ĐỘ PHÂN GIẢI
        function setupResponsiveLayout() {
            const backBtn = document.getElementById("mobile-back-btn");
            if (window.innerWidth >= 768) {
                if (backBtn) backBtn.classList.add("hidden");
                document.getElementById("admin-status-badge").textContent = isAdmin 
                    ? "⚙️ CHẾ ĐỘ QUẢN TRỊ" 
                    : "BAN HOẠT ĐỘNG - HCMUS";
            } else {
                if (backBtn) {
                    if (rightPanelState !== "home") {
                        backBtn.classList.remove("hidden");
                    } else {
                        backBtn.classList.add("hidden");
                    }
                }
            }
            renderMenu();
            renderDynamicRightPanel();
        }

        // KHỞI CHẠY KHI TẢI TRANG HOÀN TẤT
        window.addEventListener('resize', setupResponsiveLayout);
        window.onload = function() {
            setupResponsiveLayout();
        };
    </script>
</body>
</html>
